<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TapCloud – World ID</title>
  <script src="https://developer.worldcoin.org/v1/world-id.js" defer></script>
</head>
<body>
  <h1>TapCloud – Verify with World ID</h1>

  <div
    id="world-id-container"
    style="margin-top: 20px;"
  ></div>

  <script>
    window.addEventListener("DOMContentLoaded", function () {
      new WorldIDWidget({
        enableTelemetry: true,
        action_id: "orb-verification", // Ganti dengan action ID kamu
        signal: "user-session-id",     // Bisa random string/user ID
        app_id: "app_8fb6097455c4b53031a8f1d50b03ac11", // Ganti dengan App ID kamu
        container_id: "world-id-container",
        on_success: (proof) => {
          console.log("✅ Proof received:", proof);

          fetch("http://localhost:3000/verify-world-id", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(proof)
          })
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                alert("✅ World ID verified!");
              } else {
                alert("❌ Verification failed: " + data.message);
              }
            })
            .catch(err => {
              console.error(err);
              alert("❌ Network error.");
            });
        },
        on_error: (error) => {
          console.error("❌ Widget error:", error);
          alert("❌ Verification error.");
        }
      });
    });
  </script>
</body>
</html>
